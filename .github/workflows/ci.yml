name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Enable pnpm
        run: corepack enable

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      # Ratchet baseline: make origin/main resolvable in the shallow checkout.
      # `|| true`: on main itself there may be nothing new to fetch — the
      # ratchet step skip-passes without a baseline ref.
      - name: Fetch ratchet baseline
        run: git fetch origin main --depth=1 || true

      # Same gate as local `pnpm verify` — one exit code.
      - name: Verify
        run: pnpm verify
